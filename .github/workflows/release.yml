name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libmpv-dev \
            patchelf

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install mpv

      - name: Install Windows mpv dev files
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Fetch latest mpv-dev x86_64 URL from shinchiro builds
          $release = Invoke-RestMethod "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "^mpv-dev-x86_64-\d" } | Select-Object -First 1
          if (-not $asset) { throw "mpv-dev asset not found" }
          Write-Host "Downloading $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev
          Write-Host "Archive contents:" ; Get-ChildItem -Recurse mpv-dev | ForEach-Object { Write-Host $_.FullName }
          New-Item -ItemType Directory -Force -Path src-tauri/lib | Out-Null
          # Find .lib or .dll.a file (pre-built import lib)
          $libFile = Get-ChildItem -Recurse mpv-dev -Include *.lib,*.dll.a | Select-Object -First 1
          if ($libFile) {
            Write-Host "Found import lib: $($libFile.FullName)"
            Copy-Item $libFile.FullName src-tauri/lib/mpv.lib
          } else {
            # Generate import lib from .def using MSVC lib.exe
            $defFile = Get-ChildItem -Recurse mpv-dev -Include *.def | Select-Object -First 1
            if (-not $defFile) { throw "No .lib, .dll.a, or .def found in mpv-dev package" }
            Write-Host "Generating import lib from $($defFile.FullName)"
            $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            $vsPath = & $vsWhere -latest -property installationPath
            $libExe = Get-ChildItem "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\x64\lib.exe" | Select-Object -First 1
            & $libExe.FullName /def:$($defFile.FullName) /out:src-tauri/lib/mpv.lib /machine:x64
          }
          # Copy DLLs for runtime bundling
          Get-ChildItem -Recurse mpv-dev -Include *.dll | Copy-Item -Destination src-tauri/
          Write-Host "Final lib dir:" ; Get-ChildItem src-tauri/lib/ | ForEach-Object { Write-Host $_.FullName }
          Write-Host "DLLs:" ; Get-ChildItem src-tauri/*.dll | ForEach-Object { Write-Host $_.FullName }

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "blowup ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `blowup_*_aarch64.dmg` |
            | Windows (.msi) | `blowup_*_x64-setup.msi` |
            | Windows (.exe) | `blowup_*_x64-setup.nsis.exe` |
            | Linux (.deb) | `blowup_*_amd64.deb` |

            **macOS Homebrew:**
            ```
            brew tap XuanLee-HEALER/tap
            brew install --cask blowup
            ```
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # Publish draft release so assets become publicly downloadable
  publish:
    needs: build
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest --repo "${{ github.repository }}"

  # Update Homebrew cask after release is published
  update-homebrew:
    needs: publish
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/blowup_${VERSION}_aarch64.dmg"
          echo "Downloading $URL"
          curl -fSL --retry 3 --retry-delay 5 "$URL" -o blowup.dmg
          SHA=$(sha256sum blowup.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Update cask formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          cat > blowup.rb << 'CASK_EOF'
          cask "blowup" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"

            url "https://github.com/XuanLee-HEALER/blowup/releases/download/v#{version}/blowup_#{version}_aarch64.dmg"
            name "blowup"
            desc "Desktop app for film discovery, download, subtitle management, and knowledge base"
            homepage "https://github.com/XuanLee-HEALER/blowup"

            depends_on macos: ">= :ventura"

            app "blowup.app"

            zap trash: [
              "~/Library/Application Support/io.github.xuanlee-healer.blowup",
              "~/Library/Caches/io.github.xuanlee-healer.blowup",
            ]
          end
          CASK_EOF

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" blowup.rb
          sed -i "s/SHA_PLACEHOLDER/$SHA/g" blowup.rb

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' blowup.rb

          echo "--- Generated cask ---"
          cat blowup.rb

          # Push to tap repo
          CONTENT=$(base64 -w0 blowup.rb)
          EXISTING=$(gh api repos/XuanLee-HEALER/homebrew-tap/contents/Casks/blowup.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh api --method PUT repos/XuanLee-HEALER/homebrew-tap/contents/Casks/blowup.rb \
              -f message="Update blowup to $VERSION" \
              -f content="$CONTENT" \
              -f sha="$EXISTING"
          else
            gh api --method PUT repos/XuanLee-HEALER/homebrew-tap/contents/Casks/blowup.rb \
              -f message="Add blowup $VERSION" \
              -f content="$CONTENT"
          fi
