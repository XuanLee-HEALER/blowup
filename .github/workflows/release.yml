name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install macOS dependencies
        run: brew install mpv

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Build the blowup-mcp child binary FIRST and stage it under
      # crates/tauri/resources/ so tauri-build's bundle.resources check
      # ("resources/blowup-mcp") passes. Locally this is done by the
      # `just build-mcp` recipe (which `just build` depends on), but
      # tauri-action goes straight to `tauri build` and skips the
      # justfile entirely. Without this step, v2.1 release builds
      # fail with "resource path 'resources/blowup-mcp' doesn't exist".
      - name: Build and stage blowup-mcp resource
        run: |
          cargo build --release --target aarch64-apple-darwin -p blowup-mcp
          mkdir -p crates/tauri/resources
          cp target/aarch64-apple-darwin/release/blowup-mcp crates/tauri/resources/blowup-mcp

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/tauri
          tagName: ${{ github.ref_name }}
          releaseName: "blowup ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `blowup_*_aarch64.dmg` |

            **macOS Homebrew:**
            ```
            brew tap XuanLee-HEALER/tap
            brew install --cask blowup
            ```
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin

  # Publish draft release so assets become publicly downloadable
  publish:
    needs: build
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest --repo "${{ github.repository }}"

  # Update Homebrew cask after release is published
  update-homebrew:
    needs: publish
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/blowup_${VERSION}_aarch64.dmg"
          echo "Downloading $URL"
          curl -fSL --retry 3 --retry-delay 5 "$URL" -o blowup.dmg
          SHA=$(sha256sum blowup.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Update cask formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          cat > blowup.rb << 'CASK_EOF'
          cask "blowup" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"

            url "https://github.com/XuanLee-HEALER/blowup/releases/download/v#{version}/blowup_#{version}_aarch64.dmg"
            name "blowup"
            desc "Desktop app for film discovery, download, subtitle management, and knowledge base"
            homepage "https://github.com/XuanLee-HEALER/blowup"

            depends_on macos: ">= :ventura"

            app "blowup.app"

            # blowup is not code-signed or notarized, so the DMG carries
            # the com.apple.quarantine xattr. Gatekeeper then blocks the
            # first launch with "damaged / cannot be opened". Strip the
            # attribute after install so the app opens cleanly.
            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-rd", "com.apple.quarantine", "#{appdir}/blowup.app"],
                             must_succeed: false
            end

            zap trash: [
              "~/Library/Application Support/io.github.xuanlee-healer.blowup",
              "~/Library/Caches/io.github.xuanlee-healer.blowup",
            ]
          end
          CASK_EOF

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" blowup.rb
          sed -i "s/SHA_PLACEHOLDER/$SHA/g" blowup.rb

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' blowup.rb

          echo "--- Generated cask ---"
          cat blowup.rb

          # Push to tap repo
          CONTENT=$(base64 -w0 blowup.rb)
          EXISTING=$(gh api repos/XuanLee-HEALER/homebrew-tap/contents/Casks/blowup.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh api --method PUT repos/XuanLee-HEALER/homebrew-tap/contents/Casks/blowup.rb \
              -f message="Update blowup to $VERSION" \
              -f content="$CONTENT" \
              -f sha="$EXISTING"
          else
            gh api --method PUT repos/XuanLee-HEALER/homebrew-tap/contents/Casks/blowup.rb \
              -f message="Add blowup $VERSION" \
              -f content="$CONTENT"
          fi
