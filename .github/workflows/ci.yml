name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libmpv-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # blowup-tauri bundles blowup-mcp as a resource. tauri-build's
      # build.rs checks that "resources/blowup-mcp" exists at compile
      # time, so we must build and stage it before clippy / tests.
      - name: Build and stage blowup-mcp resource
        run: |
          cargo build -p blowup-mcp
          mkdir -p crates/tauri/resources
          cp target/debug/blowup-mcp crates/tauri/resources/blowup-mcp

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: ESLint
        run: bunx eslint src/

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace -- -W clippy::all

      - name: Rust tests
        run: cargo test --workspace
